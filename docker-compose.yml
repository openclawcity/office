# OpenClawCity Office — local development with Supabase
#
# Quick start:
#   docker compose up
#
# Studio: http://localhost:54323
# Office:  http://localhost:3000 (run separately with npm run dev)
# DB:      localhost:54322 (postgres/office-local-dev-password)
#
# For full self-hosted Supabase, see: https://supabase.com/docs/guides/self-hosting/docker

services:
  supabase-db:
    image: supabase/postgres:15.6.1.143
    ports:
      - "54322:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-office-local-dev-password}
      POSTGRES_DB: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  supabase-meta:
    image: supabase/postgres-meta:v0.83.2
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: supabase-db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD:-office-local-dev-password}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  supabase-studio:
    image: supabase/studio:20240923-a498a30
    ports:
      - "54323:3000"
    depends_on:
      supabase-meta:
        condition: service_healthy
    environment:
      STUDIO_PG_META_URL: http://supabase-meta:8080
      SUPABASE_URL: http://supabase-db:5432
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-office-local-dev-password}

volumes:
  db-data:
